version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/coderoad.db}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
      - SECRET_KEY=${SECRET_KEY:-local-development-only-do-not-deploy}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - JUDGE0_API_URL=${JUDGE0_API_URL:-}
      - JUDGE0_AUTH_TOKEN=${JUDGE0_AUTH_TOKEN:-}
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
