version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coderoad-postgres
    environment:
      POSTGRES_DB: coderoad
      POSTGRES_USER: coderoad
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coderoad"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coderoad-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://coderoad:${DB_PASSWORD}@postgres:5432/coderoad
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
