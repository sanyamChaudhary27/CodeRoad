<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the road/path -->
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for code brackets -->
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (subtle) -->
  <circle cx="60" cy="60" r="55" fill="url(#roadGradient)" opacity="0.1"/>
  
  <!-- Road/Path - Stylized winding road -->
  <path 
    d="M 30 85 Q 40 70, 50 60 T 70 40 T 90 35" 
    stroke="url(#roadGradient)" 
    stroke-width="12" 
    stroke-linecap="round"
    fill="none"
    filter="url(#glow)"
  />
  
  <!-- Road center line (dashed) -->
  <path 
    d="M 30 85 Q 40 70, 50 60 T 70 40 T 90 35" 
    stroke="#FFFFFF" 
    stroke-width="2" 
    stroke-linecap="round"
    stroke-dasharray="6,6"
    fill="none"
    opacity="0.6"
  />
  
  <!-- Left code bracket < -->
  <path 
    d="M 45 25 L 25 40 L 45 55" 
    stroke="url(#codeGradient)" 
    stroke-width="6" 
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#shadow)"
  />
  
  <!-- Right code bracket > -->
  <path 
    d="M 75 25 L 95 40 L 75 55" 
    stroke="url(#codeGradient)" 
    stroke-width="6" 
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#shadow)"
  />
  
  <!-- Finish flag (checkered pattern suggestion) -->
  <g transform="translate(85, 30)">
    <!-- Flag pole -->
    <line x1="0" y1="0" x2="0" y2="15" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Flag -->
    <path 
      d="M 0 0 L 12 3 L 12 10 L 0 7 Z" 
      fill="#FFFFFF"
      stroke="#A855F7"
      stroke-width="1"
    />
    
    <!-- Checkered squares -->
    <rect x="0" y="0" width="4" height="3.5" fill="#A855F7"/>
    <rect x="4" y="3.5" width="4" height="3.5" fill="#A855F7"/>
    <rect x="8" y="0" width="4" height="3.5" fill="#A855F7"/>
    <rect x="8" y="7" width="4" height="3" fill="#A855F7"/>
  </g>
  
  <!-- Speed lines (motion effect) -->
  <line x1="20" y1="75" x2="10" y2="75" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="25" y1="82" x2="12" y2="82" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="22" y1="68" x2="8" y2="68" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
