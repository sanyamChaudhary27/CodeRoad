<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Road -->
  <path d="M 180 512 L 220 200 L 292 200 L 332 512 Z" fill="url(#roadGrad)"/>
  
  <!-- Road lines (dashed) -->
  <rect x="246" y="220" width="20" height="50" fill="#fbbf24" opacity="0.9"/>
  <rect x="246" y="290" width="20" height="50" fill="#fbbf24" opacity="0.9"/>
  <rect x="246" y="360" width="20" height="50" fill="#fbbf24" opacity="0.9"/>
  <rect x="246" y="430" width="20" height="50" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Code brackets with glow -->
  <g filter="url(#glow)">
    <!-- Left bracket -->
    <path d="M 140 140 L 100 140 L 100 280 L 140 280" 
          stroke="#10b981" stroke-width="16" fill="none" 
          stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 372 140 L 412 140 L 412 280 L 372 280" 
          stroke="#10b981" stroke-width="16" fill="none" 
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Code symbol -->
  <text x="256" y="240" font-family="'Courier New', monospace" 
        font-size="120" font-weight="bold" fill="#ffffff" 
        text-anchor="middle" opacity="0.95">
    &lt;/&gt;
  </text>
  
  <!-- Racing flag checkered pattern (small, top right) -->
  <g transform="translate(380, 60)">
    <rect width="80" height="60" fill="#ffffff" rx="6"/>
    <rect x="0" y="0" width="20" height="15" fill="#1f2937"/>
    <rect x="20" y="15" width="20" height="15" fill="#1f2937"/>
    <rect x="40" y="0" width="20" height="15" fill="#1f2937"/>
    <rect x="60" y="15" width="20" height="15" fill="#1f2937"/>
    <rect x="0" y="30" width="20" height="15" fill="#1f2937"/>
    <rect x="20" y="45" width="20" height="15" fill="#1f2937"/>
    <rect x="40" y="30" width="20" height="15" fill="#1f2937"/>
    <rect x="60" y="45" width="20" height="15" fill="#1f2937"/>
  </g>
</svg>
