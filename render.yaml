services:
  - type: web
    name: coderoad-backend
    env: python
    region: oregon
    plan: free
    branch: main
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: "pip install --no-cache-dir -r backend/requirements-render.txt"
    startCommand: "cd backend && uvicorn app.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_NIM_KEY
        sync: false
      - key: NVIDIA_NIM_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_NIM_MODEL
        value: deepseek-ai/deepseek-v4-pro
      - key: JUDGE0_API_URL
        value: https://ce.judge0.com
      - key: JUDGE0_AUTH_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
